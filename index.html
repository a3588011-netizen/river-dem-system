<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RiverDEM</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:"Segoe UI",sans-serif;
}

#map{
    width:100%;
    height:100%;
}

/* =========================
   공통 패널
========================= */
.panel{
    position:absolute;
    top:55px;
    width:290px;
    height:calc(100% - 100px);
    background:#f5f5f5;
    border-radius:14px;
    box-shadow:0 4px 14px rgba(0,0,0,.2);
    overflow:hidden;
    z-index:1000;
    transition:all .25s ease;
}

.panel .head{
    padding:18px;
    font-size:18px;
    font-weight:700;
    border-bottom:1px solid #ddd;
    background:#fafafa;
}

.panel .body{
    height:calc(100% - 65px);
    overflow:auto;
    padding:14px;
}

/* =========================
   좌측 패널
========================= */
.left{
    left:15px;
}

.left.collapsed{
    width:0;
    overflow:visible;
    border:none;
}

.left.collapsed .head,
.left.collapsed .body{
    display:none;
}

/* =========================
   우측 패널
========================= */
.right{
    right:15px;
}

.right.collapsed{
    width:0;
    overflow:visible;
    border:none;
}

.right.collapsed .head,
.right.collapsed .body{
    display:none;
}

/* =========================
   토글 버튼
========================= */
.collapseBtn{
    position:absolute;
    top:12px;
    width:32px;
    height:48px;
    border:none;
    cursor:pointer;
    background:white;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    font-size:20px;
    font-weight:bold;
    z-index:1200;
}

/* 왼쪽 */
.left .collapseBtn{
    right:-32px;
    border-radius:0 10px 10px 0;
}

/* 오른쪽 */
.right .collapseBtn{
    left:-32px;
    border-radius:10px 0 0 10px;
}

/* =========================
   스크롤
========================= */
::-webkit-scrollbar{
    width:8px;
}

::-webkit-scrollbar-thumb{
    background:#bbb;
    border-radius:10px;
}

/* =========================
   예시 UI
========================= */
.item{
    padding:10px;
    border-bottom:1px solid #ddd;
    cursor:pointer;
}

.item:hover{
    background:#ececec;
}

.select{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
    margin-bottom:15px;
}

.toggle{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:18px;
}
</style>
</head>

<body>

<div id="map"></div>

<!-- =========================
     좌측 패널
========================= -->
<div class="panel left" id="leftPanel">

    <button class="collapseBtn" onclick="toggleLeft()">‹</button>

    <div class="head">
        지역 / 하천 선택
    </div>

    <div class="body">

        <select class="select">
            <option>전체</option>
            <option>서울</option>
            <option>경기</option>
            <option>강원</option>
        </select>

        <div class="item">한강 / 여의도</div>
        <div class="item">한강 / 잠실</div>
        <div class="item">중랑천</div>
        <div class="item">탄천</div>
        <div class="item">안양천</div>
        <div class="item">북한강</div>
        <div class="item">남한강</div>
        <div class="item">소양강</div>

    </div>
</div>

<!-- =========================
     우측 패널
========================= -->
<div class="panel right" id="rightPanel">

    <button class="collapseBtn" onclick="toggleRight()">›</button>

    <div class="head">
        지도 설정
    </div>

    <div class="body">

        <h3>배경지도 선택</h3>

        <select class="select">
            <option>VWorld 기본지도</option>
            <option>위성지도</option>
            <option>OSM</option>
        </select>

        <h3>지도 표시</h3>

        <div class="toggle">
            <span>측척 표시</span>
            <input type="checkbox" checked>
        </div>

        <div class="toggle">
            <span>범례 표시</span>
            <input type="checkbox" checked>
        </div>

        <div class="toggle">
            <span>좌표 표시</span>
            <input type="checkbox" checked>
        </div>

        <h3>레이어</h3>

        <div class="toggle">
            <span>DEM Overlay</span>
            <input type="checkbox" checked>
        </div>

        <div class="toggle">
            <span>Heat Map</span>
            <input type="checkbox" checked>
        </div>

    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([36.5,127.8], 7);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    attribution:'© OpenStreetMap'
}
).addTo(map);

const leftPanel = document.getElementById("leftPanel");
const rightPanel = document.getElementById("rightPanel");

/* =========================
   좌측 패널 토글
========================= */
function toggleLeft(){

    leftPanel.classList.toggle("collapsed");

    const btn = leftPanel.querySelector(".collapseBtn");

    btn.innerText =
        leftPanel.classList.contains("collapsed")
        ? "›"
        : "‹";
}

/* =========================
   우측 패널 토글
========================= */
function toggleRight(){

    rightPanel.classList.toggle("collapsed");

    const btn = rightPanel.querySelector(".collapseBtn");

    btn.innerText =
        rightPanel.classList.contains("collapsed")
        ? "‹"
        : "›";
}
</script>

</body>
</html>
