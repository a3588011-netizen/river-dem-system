<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>하천 DEM 분석 시스템</title><link rel="manifest" href="./manifest.webmanifest"><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"><style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Segoe UI,Malgun Gothic,sans-serif;color:#111827;background:#eef2f7}#app{position:relative;width:100vw;height:100vh}#map{position:absolute;inset:0;background:#dbeafe}.topTitle{position:absolute;top:18px;left:50%;transform:translateX(-50%);z-index:700;background:rgba(255,255,255,.86);backdrop-filter:blur(10px);border:1px solid #e5e7eb;border-radius:18px;padding:12px 22px;font-weight:900;font-size:22px;box-shadow:0 10px 30px #0002}.leftPanel{position:absolute;top:86px;left:24px;z-index:800;width:285px;background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border:1px solid #dbe3ef;border-radius:14px;box-shadow:0 18px 48px #0002;overflow:hidden}.menuItem{display:flex;gap:12px;align-items:center;padding:14px 18px;font-size:15px;font-weight:800;border-bottom:1px solid #edf1f7;cursor:pointer}.menuItem:hover,.menuItem.active{background:#dbeafe;color:#1d4ed8}.menuIcon{width:22px;text-align:center}.menuRight{margin-left:auto;color:#6b7280;font-weight:700}.menuSep{height:1px;background:#d1d5db;margin:8px 0}.check{width:18px;height:18px;border:1px solid #94a3b8;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;font-size:14px;color:#2563eb}.rightPanel{position:absolute;top:122px;right:28px;z-index:800;width:355px;background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border:1px solid #dbe3ef;border-radius:16px;box-shadow:0 18px 48px #0002;overflow:hidden}.panelHead{display:flex;justify-content:space-between;align-items:center;padding:20px 22px;font-weight:900;font-size:20px}.panelBody{padding:0 22px 22px}.label{margin-top:18px;color:#374151;font-size:14px;font-weight:800}select,input[type=text]{width:100%;margin-top:8px;padding:12px 14px;border:1px solid #cfd8e3;border-radius:10px;background:white;font-weight:700;color:#374151}.rangeRow{display:grid;grid-template-columns:1fr 54px;gap:12px;align-items:center;margin-top:8px}input[type=range]{width:100%;accent-color:#2563eb}.toggleRow{display:flex;justify-content:space-between;align-items:center;margin-top:18px;font-weight:800}.switch{position:relative;width:44px;height:25px;background:#2563eb;border-radius:999px}.switch:after{content:"";position:absolute;right:3px;top:3px;width:19px;height:19px;background:white;border-radius:50%;box-shadow:0 2px 8px #0003}.btn{width:100%;padding:14px;margin-top:18px;border:none;border-radius:10px;font-weight:900;font-size:15px;background:#f3f4f6;color:#111827;border:1px solid #d1d5db}.status{position:absolute;right:28px;bottom:28px;z-index:700;background:rgba(255,255,255,.92);border:1px solid #dbe3ef;border-radius:10px;padding:10px 16px;font-weight:800;box-shadow:0 10px 30px #0002}.scale{position:absolute;left:30px;bottom:34px;z-index:700;background:rgba(255,255,255,.85);padding:8px 12px;border-radius:8px;font-weight:900}.demBox{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:650;width:510px;height:510px;background:linear-gradient(140deg,rgba(245,48,35,.58),rgba(255,96,58,.55));border:1px solid rgba(255,255,255,.35);box-shadow:0 16px 50px #0002;pointer-events:none}.demRiver{position:absolute;inset:0;background:linear-gradient(35deg,transparent 0 42%,rgba(57,255,155,.75) 43%,rgba(45,220,255,.85) 48%,rgba(35,75,255,.8) 52%,rgba(110,255,120,.75) 57%,transparent 58%),linear-gradient(115deg,transparent 0 42%,rgba(255,245,90,.75) 45%,rgba(62,255,139,.75) 48%,transparent 54%);mix-blend-mode:multiply}.markerLabel{position:absolute;z-index:660;text-align:center;font-weight:900;text-shadow:0 1px 2px white}.m1{left:48%;top:24%}.m2{left:45%;top:54%}.m3{left:52%;top:70%}.log{position:absolute;left:24px;bottom:24px;z-index:900;width:360px;background:#111827;color:#4ade80;border-radius:14px;padding:12px 14px;font-family:Consolas,monospace;font-size:12px;white-space:pre-wrap;display:none}.fileInput{display:none}
</style></head><body><input class="fileInput" id="demFile" type="file" accept=".tif,.tiff"><div id="app"><div id="map"></div><div class="topTitle">☰ 하천 DEM 분석 시스템</div><div class="leftPanel"><div class="menuItem active"><span class="menuIcon">⚙</span>지도 설정</div><div class="menuItem" onclick="toggleFull()"><span class="menuIcon">▣</span>전체화면 <span class="menuRight">F11</span></div><div class="menuItem" onclick="goCurrent()"><span class="menuIcon">⌖</span>현재 위치로 이동</div><div class="menuItem" onclick="location.reload()"><span class="menuIcon">↻</span>새로고침 <span class="menuRight">F5</span></div><div class="menuSep"></div><div class="menuItem"><span class="menuIcon">›</span>지도 스타일 <span class="menuRight">›</span></div><div class="menuItem"><span class="menuIcon">›</span>레이어 관리 <span class="menuRight">›</span></div><div class="menuItem"><span class="menuIcon">›</span>측정 도구 <span class="menuRight">›</span></div><div class="menuSep"></div><div class="menuItem" onclick="toggleCheck(this)"><span class="check">✓</span>측척 표시</div><div class="menuItem" onclick="toggleCheck(this)"><span class="check">✓</span>범례 표시</div><div class="menuItem" onclick="toggleCheck(this)"><span class="check"></span>좌표 표시</div></div><div class="demBox"><div class="demRiver"></div></div><div class="markerLabel m1">⛰<br>황장산<br>(947.7m)</div><div class="markerLabel m2">⛰<br>백운산<br>(1,222.2m)</div><div class="markerLabel m3">⊙ 광양시</div><div class="rightPanel" id="rightPanel"><div class="panelHead">지도 설정 <span style="cursor:pointer" onclick="toggleRight()">×</span></div><div class="panelBody"><div class="label">지도 스타일</div><select id="mapStyle" onchange="setBaseMap()"><option>기본 지도 (VWorld)</option><option>위성 지도</option><option>지형 지도</option></select><div class="label">배경 지도 투명도</div><div class="rangeRow"><input type="range" min="20" max="100" value="100" oninput="baseOpacity.innerText=this.value+'%'"><span id="baseOpacity">100%</span></div><div class="label">좌표계</div><select><option>EPSG:3857 (Web Mercator)</option><option>EPSG:4326 (WGS84)</option><option>EPSG:5179 (Korea 2000)</option></select><div class="toggleRow">측척 표시 <span class="switch"></span></div><div class="toggleRow">범례 표시 <span class="switch"></span></div><div class="toggleRow">좌표 표시 <span class="switch"></span></div><div class="label">기본 중심 좌표</div><input type="text" value="127.8801"><input type="text" value="35.0977"><div class="label">기본 확대 레벨</div><div class="rangeRow"><input type="range" min="7" max="16" value="9" oninput="zoomText.innerText=this.value"><span id="zoomText">9</span></div><button class="btn" onclick="resetView()">기본값으로 복원</button></div></div><div class="status">EPSG:3857&nbsp;&nbsp; X: 127.8801&nbsp;&nbsp; Y: 35.0977</div><div class="scale">2 km</div><div class="log" id="log">DEM 대기 중</div></div><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script>
let map,layer,vworldKey=localStorage.getItem('vworld_key')||'';function initMap(){map=L.map('map',{zoomControl:false}).setView([35.0977,127.8801],9);setBaseMap();map.on('mousemove',e=>{document.querySelector('.status').innerText=`EPSG:3857   X: ${e.latlng.lng.toFixed(4)}   Y: ${e.latlng.lat.toFixed(4)}`})}function setBaseMap(){if(layer)map.removeLayer(layer);const url=vworldKey?'https://api.vworld.kr/req/wmts/1.0.0/'+vworldKey+'/Base/{z}/{y}/{x}.png':'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';layer=L.tileLayer(url,{maxZoom:19,attribution:vworldKey?'VWorld':'OSM'}).addTo(map)}function toggleRight(){rightPanel.style.display=rightPanel.style.display==='none'?'block':'none'}function toggleFull(){if(document.fullscreenElement)document.exitFullscreen();else document.documentElement.requestFullscreen()}function goCurrent(){if(!navigator.geolocation){alert('GPS 미지원');return}navigator.geolocation.getCurrentPosition(p=>map.setView([p.coords.latitude,p.coords.longitude],15),e=>alert(e.message))}function resetView(){map.setView([35.0977,127.8801],9)}function toggleCheck(el){const c=el.querySelector('.check');c.innerText=c.innerText?'':'✓'}function openDemFile(){demFile.click()}demFile.addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;log.style.display='block';log.innerText='DEM 파일 선택됨:\n'+f.name+'\n\n분석 엔진 연결 대기'});initMap();
</script></body></html>
