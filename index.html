<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>RiverDEM</title>
<style>
html,body,#map{margin:0;height:100%;width:100%}
body{font-family:Segoe UI,sans-serif;overflow:hidden}

.panel{
position:absolute;
top:15px;
width:300px;
height:calc(100% - 70px);
background:white;
border-radius:14px;
box-shadow:0 4px 14px rgba(0,0,0,.2);
overflow:hidden;
z-index:1000;
transition:.25s;
}

.left{left:15px}
.right{right:15px}

.head{
padding:14px;
font-weight:700;
border-bottom:1px solid #ddd;
background:#f7f7f7;
}

.body{
padding:12px;
overflow:auto;
height:calc(100% - 55px);
}

.collapseBtn{
position:absolute;
top:12px;
width:32px;
height:50px;
border:none;
background:white;
cursor:pointer;
font-size:22px;
font-weight:bold;
box-shadow:0 2px 8px rgba(0,0,0,.2);
z-index:9999;
}

.left .collapseBtn{
right:-32px;
border-radius:0 10px 10px 0;
}

.right .collapseBtn{
left:-32px;
border-radius:10px 0 0 10px;
}

.left.collapsed{
width:0;
overflow:visible;
border:none;
}

.right.collapsed{
width:0;
overflow:visible;
border:none;
}

.left.collapsed .head,
.left.collapsed .body,
.right.collapsed .head,
.right.collapsed .body{
display:none;
}

.riverItem{
padding:10px;
border-bottom:1px solid #ddd;
cursor:pointer;
}

.riverItem:hover{
background:#f0f0f0;
}

.statusbar{
position:fixed;
left:0;
right:0;
bottom:0;
height:42px;
background:#202020;
color:white;
display:flex;
align-items:center;
justify-content:flex-end;
padding:0 18px;
gap:30px;
font-size:14px;
z-index:99999;
}
</style>
</head>
<body>

<div id="map"></div>

<div class="panel left" id="leftPanel">
<button class="collapseBtn" onclick="toggleLeft()">‹</button>

<div class="head">하천 선택</div>

<div class="body" id="riverList"></div>
</div>

<div class="panel right" id="rightPanel">
<button class="collapseBtn" onclick="toggleRight()">›</button>

<div class="head">지도 설정</div>

<div class="body">
<button onclick="setVWorldKey()">VWorld API Key 설정</button>
</div>
</div>

<div class="statusbar">
<div>EPSG:3857</div>
<div id="coordX">X: -</div>
<div id="coordY">Y: -</div>
<div id="zoomLevel">LEVEL: -</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script>
const VWORLD_API_KEY =
localStorage.getItem("VWORLD_API_KEY") || "";

const map = L.map('map').setView([36.5,127.8],7);

let baseLayer;

if(VWORLD_API_KEY){

baseLayer = L.tileLayer(
`https://api.vworld.kr/req/wmts/1.0.0/${VWORLD_API_KEY}/Base/{z}/{y}/{x}.png`,
{
maxZoom:19
}
).addTo(map);

}else{

baseLayer = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

alert("VWorld API Key가 없어 OSM 지도로 실행됩니다.");
}

function setVWorldKey(){

const key = prompt(
"VWorld API Key 입력",
localStorage.getItem("VWORLD_API_KEY") || ""
);

if(key !== null){

localStorage.setItem("VWORLD_API_KEY",key);

location.reload();
}
}

const rivers = [
{name:"한강",lat:37.528,lng:126.932},
{name:"중랑천",lat:37.574,lng:127.055},
{name:"탄천",lat:37.492,lng:127.073}
];

const riverList = document.getElementById("riverList");

rivers.forEach(river=>{

const item = document.createElement("div");

item.className = "riverItem";
item.innerText = river.name;

item.ondblclick = ()=>{

map.flyTo(
[river.lat,river.lng],
13,
{duration:1.5}
);

};

riverList.appendChild(item);

});

const leftPanel = document.getElementById("leftPanel");
const rightPanel = document.getElementById("rightPanel");

function toggleLeft(){

leftPanel.classList.toggle("collapsed");

leftPanel.querySelector(".collapseBtn").innerText =
leftPanel.classList.contains("collapsed")
? "›"
: "‹";
}

function toggleRight(){

rightPanel.classList.toggle("collapsed");

rightPanel.querySelector(".collapseBtn").innerText =
rightPanel.classList.contains("collapsed")
? "‹"
: "›";
}

map.on("mousemove",e=>{

document.getElementById("coordX").innerText =
"X: " + e.latlng.lng.toFixed(5);

document.getElementById("coordY").innerText =
"Y: " + e.latlng.lat.toFixed(5);

});

map.on("zoomend",()=>{

document.getElementById("zoomLevel").innerText =
"LEVEL: " + map.getZoom();

});
</script>

</body>
</html>
